<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikite</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Core */
      --bg: #0d0c0a;
      --bg-2: #141210;
      --surface: rgba(255,220,160,0.04);
      --surface-hover: rgba(255,220,160,0.08);
      --border: rgba(255,200,120,0.1);
      --border-focus: rgba(255,180,60,0.3);
      --text-primary: #f8f2e8;
      --text-secondary: rgba(248,242,232,0.6);
      --text-muted: rgba(248,242,232,0.35);
      /* Brand — amber/orange dari logo */
      --brand: #f97316;
      --brand-hover: #ea6c0a;
      --brand-glow: rgba(249,115,22,0.4);
      --brand-subtle: rgba(249,115,22,0.12);
      --brand-2: #f59e0b;
      /* Status */
      --success: #4ade80;
      --warning: #fbbf24;
      /* Layout */
      --nav-height: 64px;
      --max-width: 1100px;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ─── Shared bg gradient ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(249,115,22,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 85% 90%, rgba(245,158,11,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Navbar ─── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      z-index: 100;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.3px;
    }

    .nav-logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text-primary);
      background: var(--surface-hover);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all var(--transition);
      letter-spacing: -0.1px;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
      color: #fff;
      box-shadow: 0 4px 16px var(--brand-glow);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--brand-hover) 0%, var(--brand) 100%);
      box-shadow: 0 6px 24px var(--brand-glow);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--surface-hover);
      border-color: var(--border-focus);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 10px 16px;
    }
    .btn-ghost:hover {
      color: var(--text-primary);
      background: var(--surface);
    }

    .btn-lg {
      padding: 14px 28px;
      font-size: 16px;
    }

    /* Nav CTA mobile: compact */
    @media (max-width: 500px) {
      .nav-cta .btn {
        padding: 8px 14px;
        font-size: 13px;
      }
    }

    @media (max-width: 400px) {
      .nav-links a { padding: 6px 8px; }
      .nav-logo { font-size: 15px; }
    }

    /* ─── Page wrapper ─── */
    #app {
      position: relative;
      z-index: 1;
    }

    /* ─── Footer ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 40px 24px;
      margin-top: 80px;
    }

    .footer-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
    }

    .footer-logo img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color var(--transition);
    }

    .footer-links a:hover { color: var(--text-secondary); }

    .footer-copy {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ─── Loading placeholder ─── */
    .page-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ─── Fade-in ─── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fade-up 0.4s cubic-bezier(0.4,0,0.2,1) both;
    }

    /* ─── Landing: Hero ─── */
    .hero {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 100px 24px 80px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid rgba(249,115,22,0.35);
      background: rgba(249,115,22,0.1);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: #fdba74;
      margin-bottom: 32px;
    }

    .hero-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 6px var(--brand);
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    .hero h1 .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #818cf8 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto 40px;
      font-weight: 400;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-note {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ─── Landing: Features ─── */
    .section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 24px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: all var(--transition);
    }

    .feature-card:hover {
      background: var(--surface-hover);
      border-color: var(--border-focus);
      transform: translateY(-2px);
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--brand-subtle);
      border: 1px solid rgba(37,99,235,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .feature-card h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .feature-card p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ─── Landing: CTA Banner ─── */
    .cta-banner {
      margin: 0 24px 80px;
      max-width: calc(var(--max-width) - 48px);
      margin-left: auto;
      margin-right: auto;
      background: linear-gradient(135deg, rgba(37,99,235,0.15) 0%, rgba(99,37,235,0.1) 100%);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 24px;
      padding: 48px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      flex-wrap: wrap;
    }

    .cta-banner-text h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .cta-banner-text p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .cta-banner-text .version-chip {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 10px;
      background: rgba(37,99,235,0.15);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: #93b4ff;
    }

    /* ─── Download page ─── */
    .page-hero {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 64px 24px 48px;
    }

    .page-hero h1 {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .page-hero p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 520px;
    }

    .latest-release {
      max-width: var(--max-width);
      margin: 0 auto 48px;
      padding: 0 24px;
    }

    .release-card-latest {
      background: linear-gradient(135deg, rgba(37,99,235,0.12) 0%, rgba(99,37,235,0.08) 100%);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 24px;
      padding: 40px;
    }

    .release-card-latest .release-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .release-version {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-latest {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
    }

    .release-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .release-changelog {
      margin-bottom: 28px;
    }

    .release-changelog h4 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .changelog-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .changelog-list li {
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.5;
    }

    .changelog-list li::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      flex-shrink: 0;
      margin-top: 6px;
    }

    .release-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-size {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* History table */
    .version-history {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .version-history h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
    }

    .history-table th {
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .history-table td {
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .history-table tr:last-child td { border-bottom: none; }

    .history-table td:first-child {
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .history-table .dl-link {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .history-table .dl-link:hover { text-decoration: underline; }

    .tag-new {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.2);
      margin-left: 6px;
    }

    /* ─── Specs page ─── */
    .specs-grid {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .spec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .spec-card.recommended {
      background: linear-gradient(135deg, rgba(37,99,235,0.08) 0%, rgba(99,37,235,0.05) 100%);
      border-color: rgba(37,99,235,0.25);
    }

    .spec-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .spec-card-icon {
      font-size: 24px;
    }

    .spec-card-header h3 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .spec-card-header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .spec-rows {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .spec-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .spec-row:last-child { border-bottom: none; }

    .spec-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      flex-shrink: 0;
    }

    .spec-value {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 600;
      text-align: right;
    }

    .specs-extra {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .extra-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .extra-card h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .extra-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .extra-tag {
      padding: 5px 12px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: monospace;
    }

    /* ─── Redirect page ─── */
    .redirect-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .redirect-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset, 0 32px 64px rgba(0,0,0,0.5);
      animation: fade-up 0.4s cubic-bezier(0.4,0,0.2,1) both;
    }

    .redirect-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .redirect-logo img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.4), 0 2px 8px rgba(37,99,235,0.2);
    }

    .redirect-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .redirect-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .redirect-header p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 12px 16px;
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.2);
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }

    .status-indicator.success {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.2);
    }

    .status-indicator.warning {
      background: rgba(245,158,11,0.08);
      border-color: rgba(245,158,11,0.2);
    }

    .dot-loader { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
    .dot-loader span {
      width: 5px; height: 5px;
      background: var(--brand);
      border-radius: 50%;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      display: none;
    }

    .status-indicator.success .status-dot { display: block; background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-indicator.warning .status-dot { display: block; background: var(--warning); box-shadow: 0 0 6px var(--warning); }
    .status-indicator.success .dot-loader,
    .status-indicator.warning .dot-loader { display: none; }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color var(--transition);
    }

    .status-indicator.success .status-text { color: var(--success); }
    .status-indicator.warning .status-text { color: var(--warning); }

    .redirect-btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .redirect-btn-group .btn {
      width: 100%;
      padding: 14px 20px;
      font-size: 15px;
    }

    .redirect-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .redirect-divider::before, .redirect-divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--border);
    }

    .redirect-divider span {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
(function () {

  // ─── Router ───────────────────────────────────────────────
  function route() {
    var path = location.pathname;
    var app  = document.getElementById('app');

    if (path.startsWith('/app/')) {
      renderRedirect(app, path.split('/')[2]);
    } else if (path === '/download') {
      renderWithChrome(app, renderDownload);
    } else if (path === '/specs') {
      renderWithChrome(app, renderSpecs);
    } else {
      renderWithChrome(app, renderLanding);
    }
  }

  // Wraps a page with nav + footer
  function renderWithChrome(container, renderPage) {
    container.innerHTML = '';
    container.appendChild(buildNav());
    var main = document.createElement('main');
    main.style.paddingTop = 'var(--nav-height)';
    renderPage(main);
    container.appendChild(main);
    container.appendChild(buildFooter());
    highlightNav();
  }

  // ─── Nav ──────────────────────────────────────────────────
  function buildNav() {
    var nav = document.createElement('nav');
    nav.className = 'nav';
    var inner = document.createElement('div');
    inner.className = 'nav-inner';

    var logo = document.createElement('a');
    logo.href = '/';
    logo.className = 'nav-logo';
    logo.onclick = function(e) { window.navigate(e, '/'); };
    logo.innerHTML = '<img src="/logo-single.png" alt="Aplikite">Aplikite';

    var navLinks = document.createElement('div');
    navLinks.className = 'nav-links';
    [['/', 'Beranda'], ['/download', 'Download'], ['/specs', 'Spesifikasi']].forEach(function(item) {
      var a = document.createElement('a');
      a.href = item[0];
      a.dataset.path = item[0];
      a.textContent = item[1];
      a.onclick = function(e) { window.navigate(e, item[0]); };
      navLinks.appendChild(a);
    });

    var navCta = document.createElement('div');
    navCta.className = 'nav-cta';
    var ctaBtn = document.createElement('a');
    ctaBtn.href = '/download';
    ctaBtn.className = 'btn btn-primary';
    ctaBtn.textContent = 'Download APK';
    ctaBtn.onclick = function(e) { window.navigate(e, '/download'); };
    navCta.appendChild(ctaBtn);

    inner.appendChild(logo);
    inner.appendChild(navLinks);
    inner.appendChild(navCta);
    nav.appendChild(inner);
    return nav;
  }

  function highlightNav() {
    var path = location.pathname;
    var links = document.querySelectorAll('.nav-links a');
    links.forEach(function(a) {
      a.classList.toggle('active', a.dataset.path === path);
    });
  }

  // ─── Footer ───────────────────────────────────────────────
  function buildFooter() {
    var footer = document.createElement('footer');
    footer.className = 'footer';
    footer.innerHTML = [
      '<div class="footer-inner">',
        '<a href="/" class="footer-logo" onclick="navigate(event, \'/\')">',
          '<img src="/logo-single.png" alt="Aplikite">',
          'Aplikite',
        '</a>',
        '<div class="footer-links">',
          '<a href="/" onclick="navigate(event, \'/\')">Beranda</a>',
          '<a href="/download" onclick="navigate(event, \'/download\')">Download</a>',
          '<a href="/specs" onclick="navigate(event, \'/specs\')">Spesifikasi</a>',
        '</div>',
        '<p class="footer-copy">&copy; 2025 Aplikite. All rights reserved.</p>',
      '</div>'
    ].join('');
    return footer;
  }

  // ─── Client-side navigation ───────────────────────────────
  window.navigate = function(e, path) {
    e.preventDefault();
    history.pushState(null, '', path);
    route();
    window.scrollTo(0, 0);
  };

  window.addEventListener('popstate', route);

  // ─── Page stubs (filled in next phases) ───────────────────
  function renderLanding(el) {
    el.innerHTML = [
      '<section class="hero fade-up">',
        '<div class="hero-badge">',
          '<span class="hero-badge-dot"></span>',
          'Tersedia untuk Android',
        '</div>',
        '<h1>Satu Aplikasi untuk<br><span class="gradient-text">Semua Kebutuhanmu</span></h1>',
        '<p class="hero-sub">Aplikite hadir sebagai solusi lengkap yang ringan, cepat, dan mudah digunakan. Dirancang khusus untuk pengguna Indonesia.</p>',
        '<div class="hero-actions">',
          '<a href="/download" class="btn btn-primary btn-lg" onclick="navigate(event,\'/download\')">',
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
            'Download Sekarang',
          '</a>',
          '<a href="/specs" class="btn btn-secondary btn-lg" onclick="navigate(event,\'/specs\')">',
            'Lihat Spesifikasi',
          '</a>',
        '</div>',
        '<p class="hero-note">Gratis &bull; Tanpa iklan &bull; APK langsung, tanpa Play Store</p>',
      '</section>',

      '<section class="section">',
        '<div class="section-header">',
          '<p class="section-label">Fitur</p>',
          '<h2 class="section-title">Kenapa Pilih Aplikite?</h2>',
          '<p class="section-desc">Dibangun dengan fokus pada performa dan kemudahan, Aplikite memberikan pengalaman terbaik di perangkatmu.</p>',
        '</div>',
        '<div class="features-grid">',
          '<div class="feature-card">',
            '<div class="feature-icon">&#9889;</div>',
            '<h3>Ringan &amp; Cepat</h3>',
            '<p>Ukuran APK yang kecil dengan performa tinggi. Tidak membebani baterai dan memori perangkat.</p>',
          '</div>',
          '<div class="feature-card">',
            '<div class="feature-icon">&#128274;</div>',
            '<h3>Aman &amp; Privat</h3>',
            '<p>Data kamu tetap di perangkatmu. Tidak ada tracking, tidak ada iklan, tidak ada penjualan data.</p>',
          '</div>',
          '<div class="feature-card">',
            '<div class="feature-icon">&#127760;</div>',
            '<h3>Offline First</h3>',
            '<p>Sebagian besar fitur berjalan tanpa koneksi internet. Tetap produktif kapanpun dan di manapun.</p>',
          '</div>',
          '<div class="feature-card">',
            '<div class="feature-icon">&#128260;</div>',
            '<h3>Update Mandiri</h3>',
            '<p>Update tersedia langsung dari halaman download kami. Kontrol penuh ada di tanganmu.</p>',
          '</div>',
        '</div>',
      '</section>',

      '<div class="cta-banner fade-up">',
        '<div class="cta-banner-text">',
          '<h2>Siap Mencoba Aplikite?</h2>',
          '<p>Download APK terbaru dan mulai gunakan sekarang juga.</p>',
          '<span class="version-chip">v1.0.0 &mdash; Terbaru</span>',
        '</div>',
        '<a href="/download" class="btn btn-primary btn-lg" onclick="navigate(event,\'/download\')">',
          'Download APK &rarr;',
        '</a>',
      '</div>',
    ].join('');
  }

  function renderDownload(el) {
    var versions = [
      {
        v: 'v1.0.2', date: '15 Jun 2025', size: '18.4 MB', isLatest: true,
        changes: [
          'Perbaikan bug crash saat membuka notifikasi',
          'Peningkatan performa loading awal',
          'Tampilan lebih responsif di layar kecil',
          'Perbaikan minor pada animasi transisi',
        ],
        url: 'https://github.com/aplikite/app/releases/download/v1.0.2/aplikite-v1.0.2.apk'
      },
      {
        v: 'v1.0.1', date: '1 Jun 2025', size: '18.1 MB', isLatest: false,
        changes: [
          'Menambahkan dark mode otomatis',
          'Perbaikan login saat koneksi lambat',
        ],
        url: 'https://github.com/aplikite/app/releases/download/v1.0.1/aplikite-v1.0.1.apk'
      },
      {
        v: 'v1.0.0', date: '20 Mei 2025', size: '17.8 MB', isLatest: false,
        changes: ['Rilis perdana Aplikite'],
        url: 'https://github.com/aplikite/app/releases/download/v1.0.0/aplikite-v1.0.0.apk'
      },
    ];

    var latest = versions[0];

    var historyRows = versions.map(function(v) {
      return [
        '<tr>',
          '<td>', v.v, v.isLatest ? '<span class="tag-new">Terbaru</span>' : '', '</td>',
          '<td>', v.date, '</td>',
          '<td>', v.changes[0], v.changes.length > 1 ? ' <span style="color:var(--text-muted)">+' + (v.changes.length - 1) + ' lainnya</span>' : '', '</td>',
          '<td>', v.size, '</td>',
          '<td><a class="dl-link" href="', v.url, '" download>&#8595; APK</a></td>',
        '</tr>'
      ].join('');
    }).join('');

    el.innerHTML = [
      '<div class="page-hero fade-up">',
        '<h1>Download Aplikite</h1>',
        '<p>Unduh APK langsung ke perangkatmu. Tidak perlu Play Store &mdash; install manual hanya butuh beberapa detik.</p>',
      '</div>',

      '<div class="latest-release fade-up">',
        '<div class="release-card-latest">',
          '<div class="release-top">',
            '<div>',
              '<div class="release-version">',
                latest.v,
                '<span class="badge-latest">Terbaru</span>',
              '</div>',
              '<p class="release-meta">Dirilis ', latest.date, ' &bull; ', latest.size, '</p>',
            '</div>',
          '</div>',
          '<div class="release-changelog">',
            '<h4>Yang Baru</h4>',
            '<ul class="changelog-list">',
              latest.changes.map(function(c) { return '<li>' + c + '</li>'; }).join(''),
            '</ul>',
          '</div>',
          '<div class="release-actions">',
            '<a href="', latest.url, '" class="btn btn-primary btn-lg" download>',
              '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
              'Download ', latest.v,
            '</a>',
            '<a href="/specs" class="btn btn-secondary" onclick="navigate(event,\'/specs\')">Cek Spesifikasi</a>',
          '</div>',
        '</div>',
      '</div>',

      '<div class="version-history fade-up">',
        '<h2>Riwayat Versi</h2>',
        '<table class="history-table">',
          '<thead><tr>',
            '<th>Versi</th>',
            '<th>Tanggal</th>',
            '<th>Perubahan</th>',
            '<th>Ukuran</th>',
            '<th>Download</th>',
          '</tr></thead>',
          '<tbody>', historyRows, '</tbody>',
        '</table>',
      '</div>',
    ].join('');
  }

  function renderSpecs(el) {
    el.innerHTML = [
      '<div class="page-hero fade-up">',
        '<h1>Spesifikasi Perangkat</h1>',
        '<p>Pastikan perangkatmu memenuhi kebutuhan minimum sebelum menginstall Aplikite.</p>',
      '</div>',

      '<div class="specs-grid fade-up">',
        '<div class="spec-card">',
          '<div class="spec-card-header">',
            '<span class="spec-card-icon">&#128313;</span>',
            '<div><h3>Minimum</h3><p>Dapat berjalan, performa dasar</p></div>',
          '</div>',
          '<div class="spec-rows">',
            '<div class="spec-row"><span class="spec-label">Android</span><span class="spec-value">8.0 Oreo (API 26)</span></div>',
            '<div class="spec-row"><span class="spec-label">RAM</span><span class="spec-value">2 GB</span></div>',
            '<div class="spec-row"><span class="spec-label">Penyimpanan</span><span class="spec-value">100 MB</span></div>',
            '<div class="spec-row"><span class="spec-label">CPU</span><span class="spec-value">Quad-core 1.4 GHz</span></div>',
            '<div class="spec-row"><span class="spec-label">Layar</span><span class="spec-value">720 &times; 1280 px</span></div>',
            '<div class="spec-row"><span class="spec-label">Koneksi</span><span class="spec-value">Tidak wajib</span></div>',
          '</div>',
        '</div>',

        '<div class="spec-card recommended">',
          '<div class="spec-card-header">',
            '<span class="spec-card-icon">&#11088;</span>',
            '<div><h3>Rekomendasi</h3><p>Performa optimal &amp; pengalaman terbaik</p></div>',
          '</div>',
          '<div class="spec-rows">',
            '<div class="spec-row"><span class="spec-label">Android</span><span class="spec-value">11.0 (API 30+)</span></div>',
            '<div class="spec-row"><span class="spec-label">RAM</span><span class="spec-value">4 GB atau lebih</span></div>',
            '<div class="spec-row"><span class="spec-label">Penyimpanan</span><span class="spec-value">200 MB</span></div>',
            '<div class="spec-row"><span class="spec-label">CPU</span><span class="spec-value">Octa-core 2.0 GHz+</span></div>',
            '<div class="spec-row"><span class="spec-label">Layar</span><span class="spec-value">1080 &times; 1920 px</span></div>',
            '<div class="spec-row"><span class="spec-label">Koneksi</span><span class="spec-value">Wi-Fi / 4G LTE</span></div>',
          '</div>',
        '</div>',
      '</div>',

      '<div class="specs-extra fade-up">',
        '<div class="extra-card">',
          '<h4>Arsitektur yang Didukung</h4>',
          '<div class="extra-tags">',
            '<span class="extra-tag">arm64-v8a</span>',
            '<span class="extra-tag">armeabi-v7a</span>',
            '<span class="extra-tag">x86_64</span>',
          '</div>',
        '</div>',
        '<div class="extra-card">',
          '<h4>Izin Aplikasi</h4>',
          '<div class="extra-tags">',
            '<span class="extra-tag">INTERNET</span>',
            '<span class="extra-tag">READ_EXTERNAL_STORAGE</span>',
            '<span class="extra-tag">WRITE_EXTERNAL_STORAGE</span>',
            '<span class="extra-tag">RECEIVE_BOOT_COMPLETED</span>',
          '</div>',
        '</div>',
        '<div class="extra-card">',
          '<h4>Cara Install APK</h4>',
          '<div class="extra-tags">',
            '<span class="extra-tag">Aktifkan &ldquo;Sumber Tidak Dikenal&rdquo;</span>',
            '<span class="extra-tag">Buka file .apk</span>',
            '<span class="extra-tag">Tap Install</span>',
          '</div>',
        '</div>',
      '</div>',
    ].join('');
  }

  function renderRedirect(container, appId) {
    var deepLink = appId ? 'aplikite://app/' + appId : null;

    container.innerHTML = [
      '<div class="redirect-wrap">',
        '<div class="redirect-card">',
          '<div class="redirect-logo">',
            '<img src="/logo-single.png" alt="Aplikite">',
          '</div>',
          '<div class="redirect-header">',
            '<h1>Aplikite</h1>',
            '<p>Membuka aplikasi di perangkat kamu...</p>',
          '</div>',
          '<div class="status-indicator" id="statusIndicator" role="status" aria-live="polite">',
            '<div class="dot-loader" aria-hidden="true"><span></span><span></span><span></span></div>',
            '<div class="status-dot" aria-hidden="true"></div>',
            '<p class="status-text" id="statusText">Mengarahkan ke aplikasi...</p>',
          '</div>',
          '<div class="redirect-btn-group">',
            deepLink
              ? '<a href="' + deepLink + '" class="btn btn-primary" id="openAppBtn" aria-label="Buka aplikasi Aplikite"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8l6 4-6 4z"/></svg> Buka Aplikasi</a>'
              : '',
            '<div class="redirect-divider"><span>atau</span></div>',
            '<a href="/download" class="btn btn-secondary" onclick="navigate(event,\'/download\')">Download Aplikite</a>',
          '</div>',
        '</div>',
      '</div>',
    ].join('');

    if (!deepLink) {
      var ind = document.getElementById('statusIndicator');
      var txt = document.getElementById('statusText');
      if (ind) ind.className = 'status-indicator warning';
      if (txt) txt.textContent = 'ID aplikasi tidak ditemukan.';
      return;
    }

    setTimeout(function() {
      location.href = deepLink;
    }, 1000);

    setTimeout(function() {
      if (!document.hidden) {
        var ind = document.getElementById('statusIndicator');
        var txt = document.getElementById('statusText');
        if (ind) ind.className = 'status-indicator warning';
        if (txt) txt.textContent = 'Aplikasi tidak terinstall? Coba download dulu.';
      }
    }, 2500);

    document.addEventListener('visibilitychange', function onVis() {
      if (document.hidden) {
        var ind = document.getElementById('statusIndicator');
        var txt = document.getElementById('statusText');
        if (ind) ind.className = 'status-indicator success';
        if (txt) txt.textContent = 'Aplikasi berhasil dibuka!';
        document.removeEventListener('visibilitychange', onVis);
      }
    });
  }

  // ─── Boot ─────────────────────────────────────────────────
  route();

})();
</script>
</body>
</html>
