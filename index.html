<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikite</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            max-width: 400px;
            padding: 24px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 16px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 14px;
            margin-top: 12px;
            border-radius: 10px;
            color: white;
            background: #2563eb;
        }

        .btn-secondary {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Aplikite</div>

    <h2>Buka di Aplikite</h2>

    <p id="info">
        Sedang membuka aplikasi...
    </p>

    <a id="openAppBtn" class="btn">
        Buka Aplikite
    </a>

    <a
        href="https://play.google.com/store/apps/details?id=com.aplikite.app"
        class="btn btn-secondary">
        Download Aplikite
    </a>
</div>

<script>

    const path = window.location.pathname;

    // URL:
    // /app/12345

    const segments = path.split('/');
    const appId = segments[2];

    const deepLink = `aplikite://app/${appId}`;

    document
        .getElementById('openAppBtn')
        .href = deepLink;

    // Auto open app
    window.location.href = deepLink;

</script>

</body>
</html>
