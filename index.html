<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikite</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Core */
      --bg: #0d0c0a;
      --bg-2: #141210;
      --surface: rgba(255,220,160,0.04);
      --surface-hover: rgba(255,220,160,0.08);
      --border: rgba(255,200,120,0.1);
      --border-focus: rgba(255,180,60,0.3);
      --text-primary: #f8f2e8;
      --text-secondary: rgba(248,242,232,0.6);
      --text-muted: rgba(248,242,232,0.35);
      /* Brand — amber/orange dari logo */
      --brand: #f97316;
      --brand-hover: #ea6c0a;
      --brand-glow: rgba(249,115,22,0.4);
      --brand-subtle: rgba(249,115,22,0.12);
      --brand-2: #f59e0b;
      /* Status */
      --success: #4ade80;
      --warning: #fbbf24;
      /* Layout */
      --nav-height: 64px;
      --max-width: 1100px;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    /* Light mode */
    :root[data-theme="light"] {
      --bg: #fafaf9;
      --bg-2: #f5f5f4;
      --surface: rgba(0,0,0,0.03);
      --surface-hover: rgba(0,0,0,0.06);
      --border: rgba(0,0,0,0.08);
      --border-focus: rgba(249,115,22,0.3);
      --text-primary: #1c1917;
      --text-secondary: rgba(28,25,23,0.7);
      --text-muted: rgba(28,25,23,0.45);
    }

    :root[data-theme="light"] body::before {
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(249,115,22,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 85% 90%, rgba(245,158,11,0.05) 0%, transparent 60%);
    }

    :root[data-theme="light"] .nav {
      background: rgba(250,250,249,0.85);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ─── Shared bg gradient ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(249,115,22,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 85% 90%, rgba(245,158,11,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Navbar ─── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      z-index: 100;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.3px;
    }

    .nav-logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text-primary);
      background: var(--surface-hover);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* Hamburger button */
    .nav-hamburger {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 10px;
      transition: background var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .nav-hamburger:hover { background: var(--surface-hover); }
    .nav-hamburger svg { display: block; width: 24px; height: 24px; }
    .nav-hamburger .icon-close { display: none; }
    .nav-hamburger.is-open .icon-menu { display: none; }
    .nav-hamburger.is-open .icon-close { display: block; }

    /* Mobile drawer */
    .nav-drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .nav-drawer-overlay.is-visible {
      display: block;
      opacity: 1;
    }

    .nav-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(320px, 85vw);
      z-index: 200;
      background: var(--bg-2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-drawer.is-open {
      transform: translateX(0);
    }

    .nav-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .nav-drawer-header .drawer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.3px;
    }
    .nav-drawer-header .drawer-logo img {
      width: 28px;
      height: 28px;
      border-radius: 7px;
    }

    .nav-drawer-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      background: var(--surface);
      border-radius: 10px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all var(--transition);
    }
    .nav-drawer-close:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .nav-drawer-links {
      display: flex;
      flex-direction: column;
      padding: 12px 12px;
      flex: 1;
    }

    .nav-drawer-links a {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
      padding: 14px 16px;
      border-radius: 12px;
      transition: all var(--transition);
    }
    .nav-drawer-links a:hover {
      color: var(--text-primary);
      background: var(--surface-hover);
    }
    .nav-drawer-links a.active {
      color: var(--text-primary);
      background: var(--surface-hover);
    }
    .nav-drawer-links a .drawer-link-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .nav-drawer-links a.active .drawer-link-icon {
      opacity: 1;
      color: var(--brand);
    }

    .nav-drawer-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .nav-drawer-footer .btn {
      width: 100%;
      justify-content: center;
    }

    /* Mobile breakpoint */
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none; }
      .nav-hamburger { display: flex; }
    }

    /* Theme toggle */
    .theme-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 10px;
      transition: all var(--transition);
      flex-shrink: 0;
      margin-right: 8px;
    }
    .theme-toggle:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }
    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    :root[data-theme="light"] .theme-toggle .icon-sun { display: block; }
    :root[data-theme="light"] .theme-toggle .icon-moon { display: none; }

    /* Desktop theme dropdown */
    .theme-dropdown {
      position: relative;
      display: flex;
      align-items: center;
    }

    .theme-dropdown-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 40px;
      padding: 0 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 10px;
      transition: all var(--transition);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
    }
    .theme-dropdown-btn:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
      border-color: var(--border-focus);
    }
    .theme-dropdown-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .theme-dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 180px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      z-index: 110;
    }
    .theme-dropdown.is-open .theme-dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .theme-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: all var(--transition);
      text-align: left;
    }
    .theme-dropdown-item:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }
    .theme-dropdown-item.is-active {
      color: var(--brand);
      background: var(--brand-subtle);
    }
    .theme-dropdown-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .theme-dropdown-item .check-icon {
      margin-left: auto;
      opacity: 0;
    }
    .theme-dropdown-item.is-active .check-icon {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .theme-dropdown { display: none; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all var(--transition);
      letter-spacing: -0.1px;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
      color: #fff;
      box-shadow: 0 4px 16px var(--brand-glow);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--brand-hover) 0%, var(--brand) 100%);
      box-shadow: 0 6px 24px var(--brand-glow);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--surface-hover);
      border-color: var(--border-focus);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 10px 16px;
    }
    .btn-ghost:hover {
      color: var(--text-primary);
      background: var(--surface);
    }

    .btn-lg {
      padding: 14px 28px;
      font-size: 16px;
    }

    @media (max-width: 400px) {
      .nav-logo { font-size: 15px; }
    }

    /* ─── Page wrapper ─── */
    #app {
      position: relative;
      z-index: 1;
    }

    /* ─── Footer ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 40px 24px;
      margin-top: 80px;
    }

    .footer-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
    }

    .footer-logo img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color var(--transition);
    }

    .footer-links a:hover { color: var(--text-secondary); }

    .footer-copy {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ─── Loading placeholder ─── */
    .page-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ─── Fade-in ─── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fade-up 0.4s cubic-bezier(0.4,0,0.2,1) both;
    }

    /* ─── Landing: Hero ─── */
    .hero {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 100px 24px 80px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid rgba(249,115,22,0.35);
      background: rgba(249,115,22,0.1);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: #fdba74;
      margin-bottom: 32px;
    }

    .hero-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 6px var(--brand);
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    .hero h1 .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #818cf8 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto 40px;
      font-weight: 400;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-note {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ─── Landing: Features ─── */
    .section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 24px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: all var(--transition);
    }

    .feature-card:hover {
      background: var(--surface-hover);
      border-color: var(--border-focus);
      transform: translateY(-2px);
    }

    .feature-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
      transform: perspective(200px) rotateX(15deg) rotateY(-15deg);
      transform-style: preserve-3d;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .feature-card:hover .feature-icon {
      transform: perspective(200px) rotateX(10deg) rotateY(-10deg) translateY(-4px) scale(1.05);
    }

    .feature-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: inherit;
      transform: translateZ(-12px);
      opacity: 0.6;
    }

    .feature-icon::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    .feature-icon svg {
      width: 40px;
      height: 40px;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .feature-icon.icon-speed {
      background: linear-gradient(135deg, #f97316 0%, #f59e0b 100%);
      box-shadow:
        0 8px 0 #c2410c,
        0 12px 20px rgba(194,65,12,0.4),
        inset 0 -3px 6px rgba(194,65,12,0.3);
    }
    .feature-icon.icon-lock {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      box-shadow:
        0 8px 0 #15803d,
        0 12px 20px rgba(21,128,61,0.4),
        inset 0 -3px 6px rgba(21,128,61,0.3);
    }
    .feature-icon.icon-battery {
      background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
      box-shadow:
        0 8px 0 #0d9488,
        0 12px 20px rgba(13,148,136,0.4),
        inset 0 -3px 6px rgba(13,148,136,0.3);
    }
    .feature-icon.icon-sync {
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      box-shadow:
        0 8px 0 #7e22ce,
        0 12px 20px rgba(126,34,206,0.4),
        inset 0 -3px 6px rgba(126,34,206,0.3);
    }

    .feature-card h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .feature-card p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ─── Landing: CTA Banner ─── */
    .cta-banner {
      margin: 0 24px 80px;
      max-width: calc(var(--max-width) - 48px);
      margin-left: auto;
      margin-right: auto;
      background: linear-gradient(135deg, rgba(37,99,235,0.15) 0%, rgba(99,37,235,0.1) 100%);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 24px;
      padding: 48px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      flex-wrap: wrap;
    }

    .cta-banner-text h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .cta-banner-text p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .cta-banner-text .version-chip {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 10px;
      background: rgba(37,99,235,0.15);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: #93b4ff;
    }

    /* ─── Download page ─── */
    .page-hero {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 64px 24px 48px;
    }

    .page-hero h1 {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .page-hero p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 520px;
    }

  function openDrawer() {
    initDrawer();
    drawer.classList.add('is-open');
    drawerOverlay.classList.add('is-visible');
    document.body.style.overflow = 'hidden';
    var hamburger = document.querySelector('.nav-hamburger');
    if (hamburger) {
      hamburger.classList.add('is-open');
      hamburger.setAttribute('aria-expanded', 'true');
    }
    highlightDrawer();
  }

  function closeDrawer() {
    if (drawer) drawer.classList.remove('is-open');
    if (drawerOverlay) drawerOverlay.classList.remove('is-visible');
    document.body.style.overflow = '';
    var hamburger = document.querySelector('.nav-hamburger');
    if (hamburger) {
      hamburger.classList.remove('is-open');
      hamburger.setAttribute('aria-expanded', 'false');
    }
  }

  function toggleDrawer() {
    if (drawer && drawer.classList.contains('is-open')) {
      closeDrawer();
    } else {
      openDrawer();
    }
  }

  function highlightDrawer() {
    if (!drawer) return;
    var path = location.pathname;
    var links = drawer.querySelectorAll('.nav-drawer-links a');
    links.forEach(function(a) {
      a.classList.toggle('active', a.dataset.path === path);
    });
  }

  function highlightNav() {
    var path = location.pathname;
    var links = document.querySelectorAll('.nav-links a');
    links.forEach(function(a) {
      a.classList.toggle('active', a.dataset.path === path);
    });
  }

  // ─── FAQ Accordion ─────────────────────────────────────────
  function initFaq() {
    var items = document.querySelectorAll('.faq-item');
    items.forEach(function(item) {
      var btn = item.querySelector('.faq-question');
      var answer = item.querySelector('.faq-answer');
      if (!btn || !answer) return;

      btn.addEventListener('click', function() {
        var isOpen = item.classList.contains('is-open');

        // Close all other items
        items.forEach(function(other) {
          if (other !== item && other.classList.contains('is-open')) {
            other.classList.remove('is-open');
            var otherAnswer = other.querySelector('.faq-answer');
            if (otherAnswer) otherAnswer.style.maxHeight = '0';
          }
        });

        // Toggle current item
        if (isOpen) {
          item.classList.remove('is-open');
          answer.style.maxHeight = '0';
        } else {
          item.classList.add('is-open');
          answer.style.maxHeight = answer.scrollHeight + 'px';
        }
      });
    });
  }

    var deepLink = appId ? 'aplikite://app/' + appId : null;

    container.innerHTML = [
      '<div class="redirect-wrap">',

          '<div class="redirect-logo">',

          '</div>',
          '<div class="status-indicator" id="statusIndicator" role="status" aria-live="polite">',
            '<div class="dot-loader" aria-hidden="true"><span></span><span></span><span></span></div>',
            '<div class="status-dot" aria-hidden="true"></div>',
            '<p class="status-text" id="statusText">Mengarahkan ke aplikasi...</p>',
          '</div>',
          '<div class="redirect-btn-group">',
            deepLink
              ? '<a href="' + deepLink + '" class="btn btn-primary" id="openAppBtn" aria-label="Buka aplikasi Aplikite"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8l6 4-6 4z"/></svg> Buka Aplikasi</a>'
              : '',
            '<div class="redirect-divider"><span>atau</span></div>',
            '<a href="/download" class="btn btn-secondary" onclick="navigate(event,\'/download\')">Download Aplikite</a>',
          '</div>',
        '</div>',
      '</div>',
    ].join('');

    if (!deepLink) {
      var ind = document.getElementById('statusIndicator');
      var txt = document.getElementById('statusText');
      if (ind) ind.className = 'status-indicator warning';
      if (txt) txt.textContent = 'ID aplikasi tidak ditemukan.';
      return;
    }

    setTimeout(function() {
      location.href = deepLink;
    }, 1000);

    setTimeout(function() {
      if (!document.hidden) {
        var ind = document.getElementById('statusIndicator');
        var txt = document.getElementById('statusText');
        if (ind) ind.className = 'status-indicator warning';
        if (txt) txt.textContent = 'Aplikasi tidak terinstall? Coba download dulu.';
      }
    }, 2500);

    document.addEventListener('visibilitychange', function onVis() {
      if (document.hidden) {
        var ind = document.getElementById('statusIndicator');
        var txt = document.getElementById('statusText');
        if (ind) ind.className = 'status-indicator success';
        if (txt) txt.textContent = 'Aplikasi berhasil dibuka!';
        document.removeEventListener('visibilitychange', onVis);
      }
    });
  }

  // ─── Theme Management ──────────────────────────────────────
  function initTheme() {
    var savedMode = localStorage.getItem('aplikite-theme-mode') || 'system';
    applyThemeMode(savedMode);
  }

  function getThemeButtonHTML() {
    var mode = localStorage.getItem('aplikite-theme-mode') || 'system';
    if (mode === 'dark') {
      return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:8px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>Mode Gelap';
    } else if (mode === 'light') {
      return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:8px"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>Mode Terang';
    } else {
      return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:8px"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>Mode Sistem';
    }
  }

  function applyThemeMode(mode) {
    localStorage.setItem('aplikite-theme-mode', mode);
    var theme;
    if (mode === 'system') {
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      theme = prefersDark ? 'dark' : 'light';
    } else {
      theme = mode;
    }
    document.documentElement.setAttribute('data-theme', theme);
  }

  function cycleTheme() {
    var currentMode = localStorage.getItem('aplikite-theme-mode') || 'system';
    var newMode;
    if (currentMode === 'system') {
      newMode = 'dark';
    } else if (currentMode === 'dark') {
      newMode = 'light';
    } else {
      newMode = 'system';
    }
    applyThemeMode(newMode);
  }

  function getThemeLabel() {
    var mode = localStorage.getItem('aplikite-theme-mode') || 'system';
    if (mode === 'dark') return 'Gelap';
    if (mode === 'light') return 'Terang';
    return 'Sistem';
  }

  function getThemeDropdownIconHTML() {
    var mode = localStorage.getItem('aplikite-theme-mode') || 'system';
    if (mode === 'dark') {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
    } else if (mode === 'light') {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';
    } else {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>';
    }
  }

  function getActiveClass(mode) {
    var current = localStorage.getItem('aplikite-theme-mode') || 'system';
    return current === mode ? ' is-active' : '';
  }

  // ─── Boot ─────────────────────────────────────────────────
  initTheme();
  route();
